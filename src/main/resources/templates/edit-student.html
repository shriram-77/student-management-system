<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Edit Student</title>
    <h1>Edit Student</h1>

    <a href="/"
       class="btn btn-secondary mb-3">
        Home
    </a>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2>Edit Student</h2>

    <form th:action="@{/students/update}"
          th:object="${student}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   th:field="*{name}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Course</label>
            <input type="text"
                   th:field="*{course}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-success">
            Update Student
        </button>

        <a href="/students"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
